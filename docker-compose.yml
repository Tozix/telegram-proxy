services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-telegram_proxy}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-telegram_proxy}']
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Point the app at the compose services (overrides anything in .env).
      DATABASE_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-telegram_proxy}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: ${PORT:-3085}
    ports:
      # ${host}:${container}. Both configurable; default to the same port.
      - '${APP_HOST_PORT:-3085}:${PORT:-3085}'
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://localhost:${PORT:-3085}/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - app
    environment:
      NODE_ENV: production
      # Reach the backend over the compose network (no CORS, server-to-server).
      API_URL: http://app:${PORT:-3085}
      PORT: ${FRONTEND_PORT:-5085}
      HOSTNAME: 0.0.0.0
      # Set to "true" only when serving the admin over HTTPS.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - '${FRONTEND_HOST_PORT:-5085}:${FRONTEND_PORT:-5085}'

volumes:
  pgdata:
  redisdata:
