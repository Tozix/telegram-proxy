services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-telegram_proxy}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-telegram_proxy}']
      interval: 5s
      timeout: 5s
      retries: 15

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override DB host so the app reaches the compose Postgres service.
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - '${PORT:-3000}:3000'
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - app
    environment:
      NODE_ENV: production
      # Reach the backend over the compose network (no CORS, server-to-server).
      API_URL: http://app:3000
      PORT: '3001'
      HOSTNAME: 0.0.0.0
      # Set to "true" only when serving the admin over HTTPS.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - '${FRONTEND_PORT:-8080}:3001'

volumes:
  pgdata:
